<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); }
  .wrap { display: flex; flex-direction: column; gap: 22px; padding: 18px 0; }
  .frame { border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); overflow: hidden; margin: 0 22px; background: var(--surface-page); }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin: 0 24px -8px; }
  .toggles { display: flex; gap: 16px; align-items: center; margin: 0 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { SiteHeader, SiteFooter, LangToggle } = window.DullBirdDesignSystem_6473ec;
  function Demo() {
    const [lang, setLang] = React.useState("zh");
    return (
      <div className="wrap">
        <span className="lbl">SiteHeader</span>
        <div className="frame"><SiteHeader lang={lang} onLangChange={setLang} active="#/writing" sticky={false} /></div>
        <div className="toggles">
          <span className="lbl" style={{margin:0}}>LangToggle</span>
          <LangToggle value={lang} onChange={setLang} />
        </div>
        <span className="lbl">SiteFooter</span>
        <div className="frame"><SiteFooter lang={lang} /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
