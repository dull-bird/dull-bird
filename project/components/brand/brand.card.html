<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 40px; margin-bottom: 30px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-heading); }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { BirdMark, Wordmark } = window.DullBirdDesignSystem_6473ec;
  function Demo() {
    return (
      <div>
        <div className="row">
          <div className="cell"><BirdMark variant="line" size={64} /><span className="lbl">line</span></div>
          <div className="cell"><BirdMark variant="solid" size={54} color="var(--accent)" /><span className="lbl">solid</span></div>
          <div className="cell"><BirdMark variant="stroke" size={54} /><span className="lbl">stroke</span></div>
          <div className="cell"><BirdMark variant="line" size={54} color="var(--accent)" /><span className="lbl">accent</span></div>
        </div>
        <div className="row" style={{gap:56, marginBottom:0}}>
          <div className="cell"><Wordmark lang="zh" size={22} /><span className="lbl">wordmark · zh</span></div>
          <div className="cell"><Wordmark lang="en" size={20} /><span className="lbl">wordmark · en</span></div>
          <div className="cell"><Wordmark lang="zh" size={20} orientation="stacked" tagline="dull-bird" /><span className="lbl">stacked + tagline</span></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
