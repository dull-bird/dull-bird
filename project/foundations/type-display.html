<!-- @dsCard group="Type" viewport="700x300" name="Display scale" subtitle="Serif headings — hero to h3" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-display); color: var(--text-heading); }
  .line { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; letter-spacing: var(--tracking-snug); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); white-space: nowrap; }
</style>
</head>
<body>
<div class="line" style="font-size:var(--text-5xl);line-height:1.05"><span>呆鸟</span><span class="tag">5xl · 88</span></div>
<div class="line" style="font-size:var(--text-4xl);line-height:1.08"><span>未来已来</span><span class="tag">4xl · 64 hero</span></div>
<div class="line" style="font-size:var(--text-3xl)"><span>分布不均 The future</span><span class="tag">3xl · 48 h1</span></div>
<div class="line" style="font-size:var(--text-2xl)"><span>笨鸟先飞，主动分享</span><span class="tag">2xl · 36 h2</span></div>
<div class="line" style="font-size:var(--text-xl)"><span>让技术更平等地被享受</span><span class="tag">xl · 28 h3</span></div>
</body>
</html>
