<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base, opening into editorial gaps" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); display: flex; flex-direction: column; gap: 9px; }
  .r { display: flex; align-items: center; gap: 12px; }
  .bar { height: 14px; background: var(--accent); border-radius: 3px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 128px; }
</style>
</head>
<body>
<div class="r"><span class="n">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
<div class="r"><span class="n">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="n">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
<div class="r"><span class="n">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="r"><span class="n">--space-5 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="r"><span class="n">--space-7 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="r"><span class="n">--space-9 · 96</span><div class="bar" style="width:96px"></div></div>
<div class="r"><span class="n">--space-11 · 160</span><div class="bar" style="width:160px"></div></div>
</body>
</html>
