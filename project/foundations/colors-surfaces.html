<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Warm paper — page, raised, sunken" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); padding: 14px; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--text-heading); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--paper)"><span class="name">--paper</span><span class="hex">#fbfaf7</span></div>
  <div class="sw" style="background:var(--paper-raised)"><span class="name">--paper-raised</span><span class="hex">#ffffff</span></div>
  <div class="sw" style="background:var(--paper-sunken)"><span class="name">--paper-sunken</span><span class="hex">#f2f0ea</span></div>
</div>
</body>
</html>
