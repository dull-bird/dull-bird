<!-- @dsCard group="Type" viewport="700x130" name="Mono & eyebrow" subtitle="The mono-caps label motif used across the brand" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); display: flex; flex-direction: column; gap: 16px; }
  .eyebrow { font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-muted); }
  .meta { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--text-body); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
<div><span class="eyebrow">思考 · Thinking in public</span> &nbsp; <span class="tag">xs · tracking-wide · uppercase</span></div>
<div><span class="meta">2026-06-18 · 6 分钟 · 译 AI</span> &nbsp; <span class="tag">sm · metadata line</span></div>
</body>
</html>
