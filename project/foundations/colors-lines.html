<!-- @dsCard group="Colors" viewport="700x130" name="Hairlines & borders" subtitle="Elevation is mostly whitespace + a single hairline" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 16px; }
  .cell { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .bar { height: 40px; background: var(--surface-card); border-radius: var(--radius-sm); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="bar" style="border:1px solid var(--line)"></div><span class="name">--line · #e6e2d9</span></div>
  <div class="cell"><div class="bar" style="border:1px solid var(--line-strong)"></div><span class="name">--line-strong · #d6d1c4</span></div>
  <div class="cell"><div class="bar" style="border:1px solid var(--accent-line)"></div><span class="name">--accent-line · tinted</span></div>
</div>
</body>
</html>
