<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">Quadratic hedging benchmark grid</title>
  <desc id="desc">A redrawn diagram of the benchmark grid over dimensions, maturities, data models, and neural architectures.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}.box{fill:#fff;stroke:#d6d1c4;stroke-width:2}.accent{fill:#8a5a2b}.line{stroke:#8a5a2b;stroke-width:3;fill:none;marker-end:url(#arrow)}.title{font:700 24px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1b1a18}.label{font:700 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1b1a18}.small{font:14px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#4a4742}.tiny{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#6f675d}.white{font:700 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#fbfaf7}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a5a2b"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="460" rx="28"/>
  <text class="title" x="52" y="58">Benchmark design for quadratic hedging</text>
  <text class="tiny" x="52" y="84">The paper evaluates architectures across dimensionality, horizon, and market dynamics.</text>

  <rect class="box" x="72" y="132" width="190" height="86" rx="16"/>
  <text class="label" x="122" y="165">Assets</text>
  <text class="small" x="112" y="193">d = 1, 10, 100</text>

  <rect class="box" x="72" y="258" width="190" height="86" rx="16"/>
  <text class="label" x="118" y="291">Maturity</text>
  <text class="small" x="105" y="319">T = 20 ... 250</text>

  <rect class="box" x="372" y="132" width="212" height="86" rx="16"/>
  <text class="label" x="424" y="165">Market model</text>
  <text class="small" x="407" y="193">BS · DCC-GARCH</text>

  <rect class="box" x="372" y="258" width="212" height="86" rx="16"/>
  <text class="label" x="424" y="291">Architecture</text>
  <text class="small" x="400" y="319">Multi · Single · RNN</text>

  <rect class="accent" x="704" y="178" width="206" height="116" rx="24"/>
  <text class="white" x="746" y="218">Compare by</text>
  <text x="731" y="250" style="font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#fbfaf7">test loss · overfit</text>
  <text x="737" y="276" style="font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#fbfaf7">speed · scalability</text>

  <path class="line" d="M262 175 L372 175"/>
  <path class="line" d="M262 301 L372 301"/>
  <path class="line" d="M584 175 C640 184 660 204 704 225"/>
  <path class="line" d="M584 301 C640 292 660 270 704 247"/>
</svg>
